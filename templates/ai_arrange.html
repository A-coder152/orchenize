<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scheduling</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="header">
    <div class="header-left">
        <a href="/account" class="account-settings-icon" title="Account Settings"><i class="fas fa-cog"></i></a>
        <span class="welcome">Welcome, {{ user }}</span>
    </div>

    <div class="header-middle">
        <a href="/" class="nav-icon home-icon" title="Home"><i class="fas fa-home"></i></a>
        <a href="/courses" class="nav-icon courses-icon" title="Courses"><i class="fas fa-book"></i></a>
        <a href="/assignments" class="nav-icon assignments-icon" title="Assignments"><i class="fas fa-tasks"></i></a>
    </div>

    <div class="header-right">
        <a class="logout-icon" href="/logout" title="Log Out"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</div>
    <main class="form-container">
        <h2>AI Scheduling</h2>
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <h4>Copy and Paste the prompt below into an AI model (Preferably Google Gemini), then put the response in the textbox. <br></h4>
            </div>
            <div class="form-group">
                <p>{{ prompt }}</p>
            </div>
            <div class="form-group">
                <label for="period_name">AI response:</label>
                <input type="text" id="result" name="result" required>
            </div>
            <button type="submit">Arrange Schedule</button>
        </form>
        <p class="login-link"><a href="/">Return to Calendar</a></p>
    </main>
</body>
</html>
