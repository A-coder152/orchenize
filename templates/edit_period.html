<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Period</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="header">
    <div class="header-left">
        <a href="/account" class="account-settings-icon" title="Account Settings"><i class="fas fa-cog"></i></a>
        <span class="welcome">Welcome, {{ user }}</span>
    </div>

    <div class="header-middle">
        <a href="/" class="nav-icon home-icon" title="Home"><i class="fas fa-home"></i></a>
        <a href="/courses" class="nav-icon courses-icon" title="Courses"><i class="fas fa-book"></i></a>
        <a href="/assignments" class="nav-icon assignments-icon" title="Assignments"><i class="fas fa-tasks"></i></a>
    </div>

    <div class="header-right">
        <a class="logout-icon" href="/logout" title="Log Out"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</div>
    <main class="form-container">
        <h2>Edit Period</h2>
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="period_name">Period Name:</label>
                <input type="text" id="period_name" name="period_name" value="{{ period.period_name }}" required>
            </div>
            <div class="form-group">
                <label for="start_time">Start Time:</label>
                <input type="datetime-local" id="start_time" name="start_time" value="{{ period.start_time }}" required>
            </div>
            <div class="form-group">
                <label for="end_time">End Time:</label>
                <input type="datetime-local" id="end_time" name="end_time" value="{{ period.end_time }}" required>
            </div>
            <div class="form-group">
                <label for="repeat_type">Repeat:</label>
                <select name="repeat_type" id="repeat_type">
                    <option value="none" {% if period.repeat == 'none' %}selected{% endif %}>None</option>
                    <option value="daily" {% if period.repeat == 'daily' %}selected{% endif %}>Daily</option>
                    <option value="weekly" {% if period.repeat == 'weekly' %}selected{% endif %}>Weekly</option>
                </select>
            </div>
            <div class="form-group">
                <label for="repeat_start">Repeat Start Time:</label>
                <input type="datetime-local" id="repeat_start" name="repeat_start" value="{{ period.repeat_start }}">
            </div>
            <div class="form-group">
                <label for="repeat_end">Repeat End Time:</label>
                <input type="datetime-local" id="repeat_end" name="repeat_end" value="{{ period.repeat_end }}">
            </div>
            <div class="form-group">
                <label for="parent">Parent:</label>
                <select name="parent" id="parent">
                    <option value="">None</option>
                    <option disabled>Courses</option>
                    {% for course in courses %}
                        <option value="{{ 'c' ~ course.id }}" {% if period.parent == 'c' ~ course.id %}selected{% endif %}>{{ course.name }}</option>
                    {% endfor %}
                    <option disabled>Assignments</option>
                    {% for assignment in assignments %}
                        <option value="{{ 'a' ~ assignment.id }}" {% if period.parent == 'a' ~ assignment.id %}selected{% endif %}>{{ assignment.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
    <label for="color_selector">Select Color:</label>
    <input type="color" id="color_selector" name="color_selector" value="{{ period.color }}">
    {% if period.parent %} <p>Setting a different color will override the parent color.</p> {% endif %}
</div>
            <div class="movable-group">
                <label for="is_movable">Movable</label>
                <input type="checkbox" id="is_movable" name="is_movable" {% if period.is_movable == "1" %}checked{% endif %}>
            </div>
            <div class="form-actions">
                <button type="submit">Update Period</button>
                <a href="/period/delete/{{ period.id }}" class="delete-button" onclick="return confirm('Are you sure you want to delete this period?')">Delete Period</a>
            </div>
        </form>
        <p class="login-link"><a href="/">Return to Calendar</a></p>
    </main>
</body>
</html>
