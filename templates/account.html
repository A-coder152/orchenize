<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="header">
    <div class="header-left">
        <a href="/account" class="account-settings-icon" title="Account Settings"><i class="fas fa-cog"></i></a>
        <span class="welcome">Welcome, {{ usert }}</span>
    </div>

    <div class="header-middle">
        <a href="/" class="nav-icon home-icon" title="Home"><i class="fas fa-home"></i></a>
        <a href="/courses" class="nav-icon courses-icon" title="Courses"><i class="fas fa-book"></i></a>
        <a href="/assignments" class="nav-icon assignments-icon" title="Assignments"><i class="fas fa-tasks"></i></a>
    </div>

    <div class="header-right">
        <a class="logout-icon" href="/logout" title="Log Out"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</div>
    <main class="account-container">
        <h2>Account Settings</h2>
        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
        <form method="post" action="/account">
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" value="{{ user.name }}" required>
            </div>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <div>
                <label for="password">New Password (leave blank to keep current):</label>
                <input type="password" id="password" name="password">
            </div>
            <div>
                <label for="confirmation">Confirm New Password:</label>
                <input type="password" id="confirmation" name="confirmation">
            </div>
            <button type="submit">Update Account</button>
        </form>
        <p class = "login-link"><a href="/">Return to Calendar</a></p>
    </main>
</body>
</html>
